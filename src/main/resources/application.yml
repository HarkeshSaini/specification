spring:
  application:
    name: demo
  data:
    mongodb:
      uri: mongodb://localhost:27017/web-application
bootstrap:
  super-admin:
    enabled: true
    email: superadmin@specification.local
    username: superadmin
    password: SuperAdmin@2026
    full-name: Platform Super Admin
    department: Platform
    designation: Super Administrator



ollama-uri: http://localhost:11434/api/generate
ollama-model: llama3
ollama:
  base-url: http://localhost:11434
  default-model: llama3
  timeout-minutes: 5
langchain4j:
  ollama:
    base-url: ${ollama.base-url}
    default-model: ${ollama.default-model}
huggingface:
  enabled: true
  # Optional: set HF_API_KEY for full router access. Leave empty for free mode (no API key).
  api-key: ${HF_API_KEY:}
  base-url: https://router.huggingface.co/v1
  free-base-url: https://router.huggingface.co/hf-inference/v1
  default-model: meta-llama/Meta-Llama-3-8B-Instruct
  free-default-model: HuggingFaceTB/SmolLM3-3B:hf-inference
  timeout-seconds: 120
ai:
  bulkhead:
    chat:
      max-concurrent: 6
      queue-capacity: 24
      acquire-timeout-seconds: 30
    agent:
      max-concurrent: 3
      queue-capacity: 12
      acquire-timeout-seconds: 60
    models:
      max-concurrent: 10
      queue-capacity: 20
      acquire-timeout-seconds: 10
    agent-max-parallel-files: 4
logging:
  level:
    com:
      specification:
        service: DEBUG
